<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f141a">
  <meta name="description" content="Gestión visual de racks, equipos y conexiones de Data Center">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DCManager">

  <title>Data Center Manager</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple touch icons (generados con SVG inline como fallback) -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     ESTRUCTURA PRINCIPAL — 3 paneles + topbar
     Equivalente a la arquitectura multi-ventana de JavaFX
══════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── TOPBAR ──────────────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-logo">⬛ DC Manager</div>
    <div class="topbar-sep"></div>
    <span class="topbar-site-label">SITE:</span>
    <div class="site-btns" id="siteBtns"><!-- inyectado por app.js --></div>
    <div class="topbar-spacer"></div>
    <button class="btn-theme" id="btnTheme" title="Cambiar tema">☀️</button>
  </header>

  <!-- ══════════════════════════════════════════════════
       PANEL IZQUIERDO — Lista de Racks
       Equivalente a Ventana Principal (lista de racks)
  ══════════════════════════════════════════════════════ -->
  <aside id="panel-left">
    <div class="panel-header">
      <span class="panel-title">RACKS</span>
      <button class="btn sm primary" id="btnNewRack">＋ Nuevo</button>
    </div>
    <div class="panel-content">
      <div id="rackList" class="rack-list"><!-- inyectado por app.js --></div>
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════
       PANEL CENTRAL — Vista Rack + Lista de Equipos
       Equivalente a Ventana Vista Rack + Ventana Equipos
  ══════════════════════════════════════════════════════ -->
  <main id="panel-mid">

    <!-- Sección: Diagrama visual del Rack -->
    <div id="rackViewPanel">
      <div class="panel-header">
        <span class="panel-title" id="rackViewTitle">RACK VIEW</span>
        <button class="btn sm" id="btnNewEquipo" style="display:none">＋ Equipo</button>
      </div>
      <div id="rackStats" class="rack-stats"><!-- inyectado por app.js --></div>
      <div style="padding: 10px;">
        <div id="rackCanvas" class="rack-frame">
          <div class="empty-state">Selecciona un rack en la columna izquierda</div>
        </div>
      </div>
    </div>

    <div class="sep" style="margin: 0 10px;"></div>

    <!-- Sección: Lista de equipos del rack -->
    <div>
      <div class="panel-header">
        <span class="panel-title" id="equiposTitle">EQUIPOS</span>
      </div>
      <div class="panel-content">
        <div class="search-row">
          <input type="text" id="searchEq" placeholder="Buscar equipo...">
          <button class="btn sm" onclick="filterEquipos()">Filtrar</button>
          <button class="btn sm" onclick="clearEquipoFilter()">✕</button>
        </div>
        <div id="equipoList"><!-- inyectado por app.js --></div>
      </div>
    </div>

  </main>

  <!-- ══════════════════════════════════════════════════
       PANEL DERECHO — Detalle equipo + Conexiones
       Equivalente a Ventana Equipos (detalle) +
       Ventana Conexiones + Ventana Conexión CRUD
  ══════════════════════════════════════════════════════ -->
  <aside id="panel-right">

    <!-- Detalle del equipo seleccionado -->
    <div>
      <div class="panel-header">
        <span class="panel-title">DETALLE EQUIPO</span>
        <button class="btn sm" id="btnEditEquipo" style="display:none">✏ Editar</button>
      </div>
      <div class="panel-content" id="equipoDetail">
        <div class="placeholder">
          <div class="placeholder-icon">💾</div>
          Selecciona un equipo
        </div>
      </div>
    </div>

    <div class="sep" style="margin: 0 14px;"></div>

    <!-- Lista de conexiones del equipo seleccionado -->
    <div>
      <div class="panel-header">
        <span class="panel-title" id="conexTitle">CONEXIONES</span>
        <button class="btn sm primary" id="btnNewConex" style="display:none" onclick="openConexModal(null)">＋</button>
      </div>
      <div class="panel-content">
        <div class="search-row">
          <input type="text" id="searchConn" placeholder="Buscar conexión...">
          <button class="btn sm" onclick="filterConexiones()">Filtrar</button>
          <button class="btn sm" onclick="clearConnFilter()">✕</button>
        </div>
        <div id="conexList"><!-- inyectado por app.js --></div>
      </div>
    </div>

    <div class="sep" style="margin: 0 14px;"></div>

    <!-- Detalle de la conexión seleccionada -->
    <div>
      <div class="panel-header">
        <span class="panel-title">DETALLE CONEXIÓN</span>
      </div>
      <div class="panel-content" id="conexDetail">
        <div class="placeholder">
          <div class="placeholder-icon">🔌</div>
          Selecciona una conexión
        </div>
      </div>
    </div>

  </aside>
</div>

<!-- ══════════════════════════════════════════════════════
     MODAL OVERLAY — CRUD de Racks / Equipos / Conexiones
     Equivalente a las ventanas modales de JavaFX
══════════════════════════════════════════════════════ -->
<div id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">—</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body"   id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ── Lógica principal (ES Module) ────────────────────── -->
<script type="module" src="app.js"></script>

<!-- ── Registro del Service Worker ─────────────────────── -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registrado:', reg.scope))
        .catch(err => console.warn('[SW] Error al registrar:', err));
    });
  }
</script>

</body>
</html>
