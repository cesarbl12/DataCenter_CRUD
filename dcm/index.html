<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f141a">
  <meta name="description" content="Gestión visual de racks, equipos y conexiones de Data Center">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DCManager">
  <title>Data Center Manager</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- ── TOPBAR ──────────────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-logo">⬛ DC Manager</div>
    <div class="topbar-sep"></div>

    <!-- Locacion dropdown -->
    <div id="locacionDropdownWrap"></div>

    <div class="topbar-sep"></div>
    <span class="topbar-site-label">SITE:</span>
    <div class="site-btns" id="siteBtns"></div>
    <div class="topbar-spacer"></div>

    <!-- Importar -->
    <button class="btn sm btn-import" id="btnImport" title="Importar CSV [Alt+I]">⬆ Importar</button>
    <div class="topbar-sep"></div>

    <!-- Indicador MySQL -->
    <span id="syncStatus" class="sync-badge sync-loading">⟳ Conectando…</span>
    <div class="topbar-sep"></div>

    <button class="btn-theme" id="btnTheme" title="Cambiar tema [Alt+T]">☀️</button>
  </header>

  <!-- ── PANEL IZQUIERDO — Lista de Racks ────────────── -->
  <aside id="panel-left">
    <div class="panel-header">
      <span class="panel-title">RACKS</span>
      <button class="btn sm primary" id="btnNewRack" title="Nuevo rack [Alt+R]">＋ Nuevo</button>
    </div>
    <div class="panel-content">
      <div id="rackList" class="rack-list"></div>
    </div>
  </aside>

  <!-- ── PANEL CENTRAL ────────────────────────────────── -->
  <main id="panel-mid">

    <div id="rackViewPanel">
      <div class="panel-header">
        <span class="panel-title" id="rackViewTitle">RACK VIEW</span>
        <button class="btn sm" id="btnEditRack"  style="display:none" title="Editar rack">✏ Rack</button>
        <button class="btn sm primary" id="btnNewEquipo" style="display:none" title="Nuevo equipo [Alt+E]">＋ Equipo</button>
      </div>
      <div id="rackStats" class="rack-stats"></div>
      <div style="padding: 10px;">
        <div id="rackCanvas" class="rack-frame">
          <div class="empty-state">Selecciona un rack en la columna izquierda</div>
        </div>
      </div>
    </div>

    <div class="sep" style="margin: 0 10px;"></div>

    <div>
      <div class="panel-header">
        <span class="panel-title" id="equiposTitle">EQUIPOS</span>
      </div>
      <div class="panel-content">
        <div class="search-row">
          <input type="text" id="searchEq" placeholder="Buscar equipo..." title="Buscar [Ctrl+F]">
          <button class="btn sm" onclick="filterEquipos()">Filtrar</button>
          <button class="btn sm" onclick="clearEquipoFilter()">✕</button>
        </div>
        <div id="equipoList"></div>
      </div>
    </div>

  </main>

  <!-- ── PANEL DERECHO ────────────────────────────────── -->
  <aside id="panel-right">

    <div>
      <div class="panel-header">
        <span class="panel-title">DETALLE EQUIPO</span>
        <button class="btn sm" id="btnEditEquipo" style="display:none" title="Editar equipo">✏ Editar</button>
      </div>
      <div class="panel-content" id="equipoDetail">
        <div class="placeholder">
          <div class="placeholder-icon">💾</div>
          Selecciona un equipo
        </div>
      </div>
    </div>

    <div class="sep" style="margin: 0 14px;"></div>

    <div>
      <div class="panel-header">
        <span class="panel-title" id="conexTitle">CONEXIONES</span>
        <button class="btn sm primary" id="btnNewConex" style="display:none" onclick="openConexModal(null)" title="Nueva conexión [Alt+C]">＋</button>
      </div>
      <div class="panel-content">
        <div class="search-row">
          <input type="text" id="searchConn" placeholder="Buscar conexión...">
          <button class="btn sm" onclick="filterConexiones()">Filtrar</button>
          <button class="btn sm" onclick="clearConnFilter()">✕</button>
        </div>
        <div id="conexList"></div>
      </div>
    </div>

    <div class="sep" style="margin: 0 14px;"></div>

    <div>
      <div class="panel-header">
        <span class="panel-title">DETALLE CONEXION</span>
      </div>
      <div class="panel-content" id="conexDetail">
        <div class="placeholder">
          <div class="placeholder-icon">🔌</div>
          Selecciona una conexión
        </div>
      </div>
    </div>

  </aside>
</div>

<!-- ── MODAL OVERLAY ──────────────────────────────────── -->
<div id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">—</span>
      <button class="modal-close" onclick="closeModal()" title="Cerrar [Esc]">✕</button>
    </div>
    <div class="modal-body"   id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
